name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just 1.40.0
        run: |
          mkdir -p "$HOME/.local/bin"
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --tag 1.40.0 --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install uv 0.6.14
        run: |
          curl -LsSf https://astral.sh/uv/0.6.14/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run CI checks
        run: just ensureci

      - name: Build
        run: just build

      - name: Publish to Forgejo PyPI
        run: >
          uv publish
          --publish-url "${{ github.server_url }}/api/packages/${{ github.repository_owner }}/pypi"
          --token "${{ secrets.FORGEJO_TOKEN }}"
